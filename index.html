<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ThroughEyes</title>
<script src="https://unpkg.com/@capacitor/core@latest/dist/capacitor.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{--bg:#080810;--surface:#10101e;--border:#1e1e32;--text:#e8e8f0;--muted:#5a5a7a;--accent:#7c6aff}
  body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
  #splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .6s}
  #splash.hide{opacity:0;pointer-events:none}
  .splash-eye{font-size:4rem;margin-bottom:16px;animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
  .splash-title{font-size:2rem;font-weight:700;letter-spacing:4px;text-transform:uppercase}
  .splash-title span{color:var(--accent)}
  .splash-sub{margin-top:8px;font-size:13px;color:var(--muted);letter-spacing:2px}
  header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(8,8,16,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);z-index:10;flex-shrink:0}
  .logo{font-size:1rem;font-weight:700;letter-spacing:2px}.logo span{color:var(--accent)}
  .current-vision{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;max-width:55%;text-align:right}.current-vision strong{color:var(--text)}
  .viewport{position:relative;flex:1;overflow:hidden;background:#000}
  video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;opacity:0}
  #glCanvas{position:absolute;inset:0;width:100%;height:100%}
  #freezeCanvas{position:absolute;inset:0;width:100%;height:100%;display:none;z-index:2}
  .info-overlay{position:absolute;top:10px;left:10px;right:10px;background:rgba(8,8,16,.92);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:none;z-index:5;max-height:50%;overflow-y:auto}
  .info-overlay.visible{display:block}
  .info-animal-name{font-size:.95rem;font-weight:700;margin-bottom:3px}
  .info-stats{font-size:10px;color:#7c6aff;margin-bottom:5px;letter-spacing:.3px}
  .info-desc{font-size:11px;color:#a0a0c0;line-height:1.7}
  .info-close{position:absolute;top:8px;right:10px;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer}
  .no-camera{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted);font-size:14px;text-align:center;padding:40px;z-index:10}
  .no-camera .icon{font-size:3rem}
  .no-camera button{margin-top:8px;padding:12px 28px;background:var(--accent);color:#fff;border:none;border-radius:50px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;-webkit-appearance:none;appearance:none;touch-action:manipulation}
  .bottom-panel{background:rgba(8,8,16,.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:7px 0 12px;flex-shrink:0}
  .category-tabs{display:flex;gap:5px;padding:0 12px 6px;overflow-x:auto;scrollbar-width:none}
  .category-tabs::-webkit-scrollbar{display:none}
  .cat-tab{padding:4px 10px;border-radius:50px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:inherit;font-size:10px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .2s;-webkit-appearance:none;appearance:none;touch-action:manipulation}
  .cat-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .animal-scroll{display:flex;gap:6px;padding:0 12px;overflow-x:auto;scrollbar-width:none}
  .animal-scroll::-webkit-scrollbar{display:none}
  .animal-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;min-width:52px;border-radius:10px;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all .2s;flex-shrink:0;-webkit-appearance:none;appearance:none;touch-action:manipulation}
  .animal-btn:active{transform:scale(.95)}
  .animal-btn.active{border-color:var(--accent);background:rgba(124,106,255,.15)}
  .animal-btn .emoji{font-size:1.2rem}
  .animal-btn .name{font-size:7px;color:var(--muted);font-weight:500;text-align:center;line-height:1.2}
  .animal-btn.active .name{color:var(--accent)}
  .action-row{display:flex;justify-content:center;gap:12px;padding:7px 10px 0}
  .action-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;color:var(--muted);font-family:inherit;font-size:8px;-webkit-appearance:none;appearance:none;touch-action:manipulation}
  .action-btn .icon{width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:.95rem}
  .action-btn:active .icon{transform:scale(.9)}
  .action-btn.capture .icon{width:48px;height:48px;background:var(--accent);border-color:var(--accent);font-size:1.1rem}
  .toast{position:fixed;bottom:95px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(124,106,255,.92);color:#fff;padding:8px 18px;border-radius:50px;font-size:11px;font-weight:500;opacity:0;transition:all .3s;pointer-events:none;z-index:50;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media(min-width:768px){
    .animal-btn{min-width:72px;padding:10px 8px}
    .animal-btn .emoji{font-size:1.6rem}
    .animal-btn .name{font-size:9px}
    .cat-tab{padding:6px 14px;font-size:12px}
    .action-btn .icon{width:48px;height:48px;font-size:1.1rem}
    .action-btn.capture .icon{width:58px;height:58px;font-size:1.3rem}
    .action-btn{font-size:10px}
    .no-camera{font-size:18px;gap:16px}
    .no-camera button{padding:16px 36px;font-size:17px}
    .logo{font-size:1.2rem}
    .current-vision{font-size:12px}
    .info-overlay{padding:16px 18px;max-height:60%}
    .info-animal-name{font-size:1.1rem}
    .info-stats{font-size:12px}
    .info-desc{font-size:13px}
  }
</style>
</head>
<body>

<div id="splash">
  <div class="splash-eye">👁</div>
  <div class="splash-title">Through<span>Eyes</span></div>
  <div class="splash-sub">Onların dünyasını gör</div>
</div>

<header>
  <div class="logo">Through<span>Eyes</span></div>
  <div class="current-vision">Görüş: <strong id="currentName">İnsan</strong></div>
</header>

<div class="viewport">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="glCanvas"></canvas>
  <canvas id="freezeCanvas"></canvas>
  <div class="info-overlay" id="infoOverlay">
    <button class="info-close" onclick="closeInfo()">✕</button>
    <div class="info-animal-name" id="infoName"></div>
    <div class="info-stats" id="infoStats"></div>
    <div class="info-desc" id="infoDesc"></div>
  </div>
  <div class="no-camera" id="noCameraMsg" style="display:none">
    <div class="icon">📷</div>
    <div>Camera access is required</div>
    <button onclick="startCamera()">Continue</button>
  </div>
</div>

<div class="bottom-panel">
  <div class="category-tabs" id="categoryTabs"></div>
  <div class="animal-scroll" id="animalScroll"></div>
  <div class="action-row">
    <button class="action-btn" onclick="toggleInfo()"><div class="icon">ℹ️</div><span>Bilgi</span></button>
    <button class="action-btn" onclick="takePhoto()"><div class="icon">📸</div><span>Çek</span></button>
    <button class="action-btn capture" onclick="sharePhoto()"><div class="icon">📤</div><span>Paylaş</span></button>
    <button class="action-btn" onclick="toggleSelfie()"><div class="icon">🤳</div><span>Selfie</span></button>
    <button class="action-btn" onclick="toggleCompare()"><div class="icon">🔀</div><span>Karşılaştır</span></button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const A=[
  {id:'human',name:'İnsan',emoji:'🧑',cat:'ref',stats:'Trikromat | 180° | 20/20',desc:'Normal insan görüşü — 3 renk reseptörü (kırmızı, yeşil, mavi). Merkezi görüş keskin, iyi derinlik algısı. 180° görüş alanı. İnsanlar renkleri en iyi algılayan canlılardan biridir ancak UV ve kızılötesi ışığı göremeyiz.',f:0},
  {id:'dog',name:'Köpek',emoji:'🐕',cat:'pets',stats:'Dikromat mavi-sarı | 240° | 20/75',desc:'Köpekler dünyayı mavi ve sarı tonlarında görür — kırmızı ve yeşili ayırt edemezler. Görüş keskinlikleri insanın 1/3\'ü kadardır (20/75). Ancak hareket algıları insandan 10 kat daha iyidir. 240° geniş görüş alanı ve tapetum lucidum sayesinde gece görüşleri insandan çok daha iyidir. Yere yakın bakış açıları dünyayı alçak ve geniş gösterir.',f:1},
  {id:'cat',name:'Kedi',emoji:'🐈',cat:'pets',stats:'Dikromat mavi-yeşil | 200° | 20/150 | Gece: 6-8x',desc:'Kediler soluk, desatüre bir dünya görür — mavi-yeşil tonları baskındır. Uzaktaki nesneler bulanıktır (20/150). Ancak tapetum lucidum sayesinde gece görüşleri insandan 6-8 kat daha iyidir. 200° geniş görüş alanına sahiptirler. En ufak hareketi anında algılarlar — bir kağıdın kenarının kıpırdamasını bile fark ederler.',f:2},
  {id:'eagle',name:'Kartal',emoji:'🦅',cat:'birds',stats:'Tetrakromat+UV | 340° | 20/4',desc:'Kartallar dünyayı insanların hayal edemeyeceği netlikte görür. Görme keskinlikleri insanın 4-5 katıdır (20/4). Derin fovea sayesinde merkez görüşleri teleskop gibi yakınlaştırır. 4 renk reseptörü + UV görüşü ile insanların göremediği desenleri algılarlar. 340° görüş alanı ile arkalarını bile neredeyse görebilirler. 3 km uzaktaki bir tavşanı tespit edebilirler.',f:3},
  {id:'owl',name:'Baykuş',emoji:'🦉',cat:'birds',stats:'Çubuk hücresi baskın | 110° | Aşırı gece görüşü',desc:'Baykuşlar gecenin hakimidir. Tüp şeklindeki gözleri hareket edemez bu yüzden başlarını 270° çevirebilirler. Retinalarındaki çubuk hücreleri sayesinde neredeyse tam karanlıkta bile görebilirler. Dünyaları yeşilimsi ve loş bir gece manzarası gibidir. Görüş alanları dar (110°) ama binoküler görüşleri mükemmeldir.',f:4},
  {id:'pigeon',name:'Güvercin',emoji:'🐦',cat:'birds',stats:'Tetrakromat+UV | 300° | ~20/30',desc:'Güvercinler UV\'yi ayrı bir 4. renk olarak görür. Renkli yağ damlacıkları renk algısını filtreler ve saflaştırır. Çiçekler ve tüyler üzerindeki UV desenleri onlar için tamamen farklı bir dünya yaratır. 300° geniş görüş alanına sahiptirler.',f:5},
  {id:'flamingo',name:'Flamingo',emoji:'🦩',cat:'birds',stats:'Tetrakromat+UV | 300° | ~0.8',desc:'Flamingolar UV ışığında tüylerinin pembe rengini çok daha parlak ve karmaşık desenlerle görür. Bu desenler çiftleşme seçiminde kritik rol oynar. Su altında dalış yaparken lens şekillerini değiştirerek görüşlerini ayarlayabilirler.',f:53},
  {id:'bee',name:'Arı',emoji:'🐝',cat:'insects',stats:'Trikromat UV-mavi-yeşil | 280° | Polarizasyon',desc:'Arılar kırmızı rengi göremez — onlar için görünmezdir. Ancak UV ışığını görürler ve çiçekler üzerindeki UV desenleri onlar için iniş pisti görevi görür. Bileşik gözleri binlerce küçük lensden oluşur ve altıgen mozaik görüntü yaratır. Bulutlu günlerde bile polarize ışık sayesinde güneşin yerini belirleyebilirler.',f:6},
  {id:'butterfly',name:'Kelebek',emoji:'🦋',cat:'insects',stats:'6 fotoreseptör | 300° | UV desenleri',desc:'Kelebekler 6 farklı fotoreseptör tipine sahiptir — insandan iki kat fazla. UV görüşleri kanat desenlerini ve çiçek rehberlerini ortaya çıkarır. Beyaz nesneler UV altında insanın göremediği canlı desenlerle kaplanır. Böcek dünyasının en renkli görüşüne sahiptirler.',f:7},
  {id:'firefly',name:'Ateş Böceği',emoji:'✨',cat:'insects',stats:'Biyolüminesans uyumlu | Karanlık adapteli',desc:'Ateş böceklerinin gözleri karanlıkta biyolüminesans flaşları algılamak için evrimleşmiştir. Dünyaları neredeyse tamamen karanlıktır — sadece parlayan objeler ve ışık kaynakları görünür. Bu sayede eşlerinin ışık sinyallerini uzaktan tespit edebilirler.',f:8},
  {id:'fly',name:'Sinek',emoji:'🪰',cat:'insects',stats:'Trikromat UV | 360° | 250Hz',desc:'Sineklerin bileşik gözleri 250Hz titreşim füzyonuna sahiptir — insanın 5 katı hız. Bu yüzden dünya onlar için ağır çekim gibidir. El sallayarak sineği vurmaya çalıştığınızda o sizi yavaş çekimde görür. 360° tam çevre görüşü ile her yönü aynı anda görebilirler.',f:9},
  {id:'spider',name:'Sıçrayan Örümcek',emoji:'🕷️',cat:'insects',stats:'Trikromat | 360° (8 göz) | Merkezde keskin',desc:'8 göze sahiptir: 2 büyük ön göz inanılmaz keskinlikte görürken, 6 çevresel göz geniş alan tespiti yapar. Ön gözleri bağımsız olarak dönerek hedefi takip edebilir. Küçük bedenlerine rağmen hayvan aleminin en gelişmiş görüş sistemlerinden birine sahiptirler.',f:10},
  {id:'shark',name:'Köpekbalığı',emoji:'🦈',cat:'sea',stats:'Monokromat | Yüksek kontrast hassasiyeti',desc:'Köpekbalıkları pratik olarak renk körüdür — dünyayı mavi-yeşil tek renk tonunda görürler. Ancak kontrast hassasiyetleri aşırı yüksektir. Su altındaki en ufak hareket ve gölge farkını algılarlar. Bulanık suda bile avlarının siluetini tespit edebilirler.',f:11},
  {id:'mantis',name:'Mantis Karidesi',emoji:'🦐',cat:'sea',stats:'12-16 reseptör | 360° | Dairesel polarizasyon',desc:'Dünyadaki en karmaşık görsel sisteme sahip canlı. 16 farklı fotoreseptörü ile insanın hayal bile edemeyeceği renkleri algılar. Dairesel polarize ışığı görebilen tek hayvandır. Sap gözleri bağımsız 360° hareket eder. Renk algısı insan anlayışının çok ötesindedir.',f:12},
  {id:'deepsea',name:'Derin Deniz Balığı',emoji:'🐠',cat:'sea',stats:'Monokromat | Tam karanlık adapteli',desc:'Okyanusun dibinde güneş ışığı ulaşamaz. Bu balıklar sadece diğer canlıların biyolüminesans ışığını görebilir — siyan-mavi parlayan noktalar. Geri kalan her şey zifiri karanlıktır. Kendi vücutlarındaki ışık organlarıyla iletişim kurarlar.',f:13},
  {id:'octopus',name:'Ahtapot',emoji:'🐙',cat:'sea',stats:'Monokromat | 360° | Polarizasyon görüşü',desc:'Ahtapotlar renk körü olmalarına rağmen mükemmel kamuflaj yapabilir — bu bilim dünyasının büyük gizemlerinden biridir. Polarizasyon görüşü ve kromatik aberasyon kullanarak renkleri dolaylı yoldan algılarlar. Kenarlar polarize ışık farkıyla gökkuşağı gibi parıldar.',f:14},
  {id:'whale',name:'Mavi Balina',emoji:'🐋',cat:'sea',stats:'Monokromat | 160° | 20/240',desc:'Dünyanın en büyük canlısı tamamen renk körüdür — tek tip koni hücresi vardır. Görme keskinliği çok düşüktür (20/240). Okyanusta bulanık, gri tonlamalı, dalgalanan bir dünya görür. Görme yerine ekolokasyona güvenir.',f:15},
  {id:'zebrafish',name:'Zebra Balığı',emoji:'🐟',cat:'sea',stats:'Tetrakromat+UV | 160° | 20/2000',desc:'4 koni tipi + UV görüşüne sahiptir. Ancak görme keskinliği aşırı düşüktür — insanın 100 katı kötü. UV ışığını kullanarak zooplanktonları tespit eder çünkü bu küçük canlılar UV altında parlar.',f:16},
  {id:'dolphin',name:'Yunus',emoji:'🐬',cat:'sea',stats:'Monokromat | 360° | Ekolokasyon',desc:'Yunuslar renk göremez — tek tip koni hücresiyle siyah-beyaz dünya algılar. Su altında gözlerinin şeklini değiştirerek odaklama yapar. Görmenin yetersiz kaldığı yerde sonar kullanır — ses dalgalarının yansımasını zihinsel görüntüye çevirir.',f:54},
  {id:'snake',name:'Yılan (Termal)',emoji:'🐍',cat:'reptiles',stats:'Dikromat+Kızılötesi | 200° | Termal görüş',desc:'Çukur organları kızılötesi (infrared) ışını algılar — sıcakkanlı canlıları vücut ısılarından "görür". Soğuk nesneler koyu mavi, sıcak nesneler turuncu-beyaz parlar. Tam karanlıkta bile bir fareyi 1 metreden tespit edebilir. Normal görüşlerinin üzerine termal katman bindirirler.',f:17},
  {id:'snake_day',name:'Yılan (Gündüz)',emoji:'🟡',cat:'reptiles',stats:'Dikromat mavi-yeşil | 200° | Kırmızı yok',desc:'Gündüz aktif yılanların görüşü dikromatiktir — kırmızıyı göremezler. Dünya soluk mavi-yeşil tonlarında, düşük keskinlikte görünür. Geniş alan görüşüne sahiptirler ancak detay algıları zayıftır.',f:18},
  {id:'croc',name:'Timsah',emoji:'🐊',cat:'reptiles',stats:'Tetrakromat | 200° | Yarık gözbebek',desc:'Yarık gözbebekleri dramatik bir sinematik letterbox görünüm yaratır. Yüksek kontrast, yeşil tonlu panoramik görüş. Su seviyesinden bakar. Tapetum lucidum sayesinde gece görüşü güçlüdür. Karanlıkta gözleri kırmızı parlar.',f:19},
  {id:'chameleon',name:'Bukalemun',emoji:'🦎',cat:'reptiles',stats:'Tetrakromat+UV | 360° | Bağımsız gözler',desc:'Her bir gözü bağımsız hareket eder — aynı anda iki farklı yöne bakabilir! Beyin iki ayrı görsel akışı aynı anda işler. UV tetrakromat görüşe sahiptir. Avını tespit ettiğinde her iki göz de hedefe kilitlenir.',f:20},
  {id:'horse',name:'At',emoji:'🐴',cat:'mammals',stats:'Dikromat | 350° | ~20/33',desc:'Atlar neredeyse 360° görüş alanına sahiptir — sadece tam önlerinde ve arkalarında küçük kör noktaları vardır. Ancak sadece %20\'si binokülerdir bu yüzden derinlik algıları zayıftır. Mavi-sarı dikromat olarak kırmızı ve yeşili ayırt edemezler. Dünya onlar için geniş, panoramik ve soluk renklidir.',f:21},
  {id:'bat',name:'Yarasa',emoji:'🦇',cat:'mammals',stats:'Neredeyse kör | UV | Ekolokasyon',desc:'Yarasalar gündüz neredeyse göremez. Bazı türlerde UV görüşü vardır. Karanlıkta tamamen ekolokasyona güvenirler — ses dalgalarının yansımasıyla çevrelerinin 3D haritasını çıkarırlar. Sonar yankısı şekilleri kenar çizgileri olarak ortaya koyar.',f:22},
  {id:'mole',name:'Köstebek',emoji:'🐀',cat:'mammals',stats:'Sadece aydınlık-karanlık | ~20/600',desc:'Köstebekler neredeyse tamamen kördür — sadece ışık ile karanlığı ayırt edebilir. Dünya onlar için sadece kenar çizgilerinden oluşan bulanık bir haritadır. Tamamen dokunma, koku ve titreşim duyularına güvenirler.',f:23},
  {id:'wolf',name:'Kurt',emoji:'🐺',cat:'mammals',stats:'Dikromat mavi-sarı | 250° | 20/250 | Gece güçlü',desc:'Kurtlar kırmızı ve yeşili göremez — dünyaları mavi-sarı tonlarındadır. Tapetum lucidum ile gece görüşleri mükemmeldir. En ufak hareketi çok uzaktan algılarlar. 250° geniş görüş alanı ile avlanırken çevreyi sürekli tarar.',f:55},
  {id:'lion',name:'Aslan',emoji:'🦁',cat:'mammals',stats:'Dikromat | 200° | 20/200 | Savana adapteli',desc:'Aslanlar kırmızı-yeşil renk körüdür. Dünyaları mavi, sarı, gri ve kahverengi tonlarından oluşur. Parlak güneş altında yüksek kontrast algıları sayesinde sarı çimenler arasında gizlenen zebrayı tespit ederler. Kırmızı pelerini değil, matadorun hareketini takip ederler.',f:56},
  {id:'elephant',name:'Fil',emoji:'🐘',cat:'mammals',stats:'Dikromat mavi-sarı | 280° | ~0.6',desc:'Filler dikromat olup kırmızı ve yeşili ayırt edemez. Gözleri başın iki yanında olduğu için ~280° geniş alan görüşüne sahiptir ancak binoküler alanları çok dardır (~25°). Genç filleri yırtıcılardan korumak için çevreyi sürekli taramaları hayati önem taşır.',f:57},

    if(video.readyState>=2&&gl){
      const t=(Date.now()-startTime)/1000;
      gl.bindTexture(gl.TEXTURE_2D,tex);
      gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,video);
      gl.uniform1i(uFilter,currentAnimal.f);gl.uniform1f(uTime,t);gl.uniform2f(uRes,glCanvas.width,glCanvas.height);
      gl.uniform1i(uCompare,compareMode?1:0);
      gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
    }
    animFrame=requestAnimationFrame(loop);
  };loop();
}

document.addEventListener('visibilitychange',()=>{
  if(!document.hidden&&video.srcObject){
    const tracks=video.srcObject.getTracks();
    if(tracks.length===0||tracks[0].readyState==='ended'){startCamera();}
  }
});
if(window.Capacitor){
  document.addEventListener('resume',()=>{startCamera();});
}

function toggleSelfie(){
  facingMode=facingMode==='environment'?'user':'environment';
  startCamera(facingMode);
  showToast(facingMode==='user'?'Selfie modu 🤳':'Arka kamera 📷');
}

async function takePhoto(){
  if(!gl)return;
  const t=(Date.now()-startTime)/1000;
  gl.bindTexture(gl.TEXTURE_2D,tex);gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,video);
  gl.uniform1i(uFilter,currentAnimal.f);gl.uniform1f(uTime,t);gl.uniform2f(uRes,glCanvas.width,glCanvas.height);gl.uniform1i(uCompare,0);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  lastPhotoUrl=glCanvas.toDataURL('image/jpeg',.92);
  const img=new Image();
  img.onload=()=>{
    freezeCtx.drawImage(img,0,0,freezeCanvas.width,freezeCanvas.height);
    freezeCanvas.style.display='block';
    setTimeout(()=>{freezeCanvas.style.display='none';},1500);
  };
  img.src=lastPhotoUrl;
  const base64=lastPhotoUrl.split(',')[1];
  const fileName='ThroughEyes_'+currentAnimal.id+'_'+Date.now()+'.jpg';
  if(window.AndroidBridge){
    const result=window.AndroidBridge.saveImageToGallery(base64,fileName);
    if(result==='success'){showToast('📸 Galeriye kaydedildi!');return;}
  }
  const a=document.createElement('a');a.download=fileName;a.href=lastPhotoUrl;a.click();
  showToast('📸 Kaydedildi!');
}

async function sharePhoto(){
  if(!lastPhotoUrl){takePhoto();await new Promise(r=>setTimeout(r,300));}
  if(!lastPhotoUrl)return;
  const fn=`througheyes_${currentAnimal.id}.jpg`;
  const cap=`${currentAnimal.name} gözüyle dünyaya bak 👁 #ThroughEyes`;
  if(navigator.share){
    try{
      const blob=await(await fetch(lastPhotoUrl)).blob();
      const file=new File([blob],fn,{type:'image/jpeg'});
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        await navigator.share({title:'ThroughEyes',text:cap,files:[file]});
        showToast('Paylaşıldı! 🎉');lastPhotoUrl=null;return;
      }
    }catch(e){}
  }
  if(window.Capacitor&&window.Capacitor.Plugins&&window.Capacitor.Plugins.Share){
    try{await window.Capacitor.Plugins.Share.share({title:'ThroughEyes',text:cap,dialogTitle:'Paylaş'});showToast('Paylaşıldı!');lastPhotoUrl=null;return;}catch(e){}
  }
  const a=document.createElement('a');a.download=fn;a.href=lastPhotoUrl;a.click();showToast('Kaydedildi!');
}

function toggleCompare(){compareMode=!compareMode;showToast(compareMode?'Karşılaştırma: SOL=İnsan, SAĞ='+currentAnimal.name:'Karşılaştırma kapalı');}
function buildCategories(){const c=document.getElementById('categoryTabs');c.innerHTML='';CATEGORIES.forEach(cat=>{const btn=document.createElement('button');btn.className='cat-tab'+(cat.id===currentCategory?' active':'');btn.textContent=cat.label;btn.onclick=()=>selectCategory(cat.id);c.appendChild(btn);});}
function buildAnimalGrid(cat){const c=document.getElementById('animalScroll');c.innerHTML='';(cat==='all'?A:A.filter(a=>a.cat===cat)).forEach(a=>{const btn=document.createElement('button');btn.className='animal-btn'+(a.id===currentAnimal.id?' active':'');btn.innerHTML=`<span class="emoji">${a.emoji}</span><span class="name">${a.name}</span>`;btn.onclick=()=>selectAnimal(a);c.appendChild(btn);});}
function selectCategory(id){currentCategory=id;buildCategories();buildAnimalGrid(id);}
function selectAnimal(a){currentAnimal=a;document.getElementById('currentName').textContent=a.name;buildAnimalGrid(currentCategory);showToast(a.name);}
function toggleInfo(){const o=document.getElementById('infoOverlay');document.getElementById('infoName').textContent=currentAnimal.emoji+' '+currentAnimal.name;document.getElementById('infoStats').textContent=currentAnimal.stats;document.getElementById('infoDesc').textContent=currentAnimal.desc;o.classList.toggle('visible');}
function closeInfo(){document.getElementById('infoOverlay').classList.remove('visible')}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

buildCategories();buildAnimalGrid('all');
const glOK=initGL();
setTimeout(()=>{document.getElementById('splash').classList.add('hide');startCamera();},1800);
</script>
